name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:  # 수동 실행 가능하게 추가
    paths:
      - "src/**/*.java"           # 모든 자바 파일
      - "src/**/*.yml"            # YAML 설정 파일 (application.yml 등)
      - "src/**/*.yaml"           # YAML 설정 파일
      - "src/**/*.properties"     # Properties 파일
      - "src/**/*.xml"            # XML 설정 파일
      - "src/**/*.sql"            # SQL 파일들
      - "pom.xml"                 # Maven 설정
      - "Dockerfile"              # Docker 설정
      - "docker-compose.yml"      # Docker Compose 설정

jobs:
  claude-review:
    # WIP나 skip-review 태그가 있으면 건너뛰기
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]') &&
      !contains(github.event.pull_request.title, 'WIP:')
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write      # 댓글 작성을 위해 write 필요!
      issues: write            # PR 댓글 작성을 위해 write 필요!
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # diff 비교를 위해 히스토리 필요

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude-code review \
            --diff \
            --base origin/${{ github.event.pull_request.base.ref }} \
            --context "Spring Boot Java project with JPA/Hibernate" \
            --focus "security,performance,best-practices" \
            --format github \
            > review-output.md
          
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewOutput = fs.readFileSync('review-output.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude Code Review\n\n${reviewOutput}`
            });
