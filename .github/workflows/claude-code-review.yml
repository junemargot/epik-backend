name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.java"

jobs:
  claude-review:
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Java files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep '\.java$' > changed_files.txt || true
          FILE_COUNT=$(wc -l < changed_files.txt)
          echo "changed_file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          echo "## Changed Files Diff" > review_context.md
          head -20 changed_files.txt | while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "### $file" >> review_context.md
              echo '```diff' >> review_context.md
              git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | head -100 >> review_context.md
              echo '```' >> review_context.md
            fi
          done

      - name: Setup Node.js
        if: steps.changed-files.outputs.changed_file_count > 0
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Anthropic SDK
        if: steps.changed-files.outputs.changed_file_count > 0
        run: npm install @anthropic-ai/sdk

      - name: Create and Run Claude Code Review
        if: steps.changed-files.outputs.changed_file_count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 환경 변수 정리 및 검증
          export CLEANED_API_KEY=$(echo "$ANTHROPIC_API_KEY" | tr -d '\r\n' | xargs)
          echo "Cleaned API Key length: ${#CLEANED_API_KEY}"
          
          # JavaScript 파일 생성
          echo 'const Anthropic = require("@anthropic-ai/sdk");' > claude_review.js
          echo 'const fs = require("fs");' >> claude_review.js
          echo '' >> claude_review.js
          echo '// API Key 정리 및 검증' >> claude_review.js
          echo 'const rawApiKey = process.env.ANTHROPIC_API_KEY;' >> claude_review.js
          echo 'const cleanApiKey = rawApiKey.trim().replace(/[\\r\\n]/g, "");' >> claude_review.js
          echo 'console.log("Final API Key length:", cleanApiKey.length);' >> claude_review.js
          echo '' >> claude_review.js
          echo 'const anthropic = new Anthropic({' >> claude_review.js
          echo '  apiKey: cleanApiKey,' >> claude_review.js
          echo '});' >> claude_review.js
          echo '' >> claude_review.js
          echo 'async function reviewCode() {' >> claude_review.js
          echo '  console.log("🚀 Starting Claude API call...");' >> claude_review.js
          echo '  ' >> claude_review.js
          echo '  const message = await anthropic.messages.create({' >> claude_review.js
          echo '    model: "claude-3-5-sonnet-latest",' >> claude_review.js
          echo '    max_tokens: 1000,' >> claude_review.js
          echo '    messages: [{' >> claude_review.js
          echo '      role: "user",' >> claude_review.js
          echo '      content: "Hello! Please respond in Korean that the API connection is working."' >> claude_review.js
          echo '    }]' >> claude_review.js
          echo '  });' >> claude_review.js
          echo '' >> claude_review.js
          echo '  return message.content[0].text;' >> claude_review.js
          echo '}' >> claude_review.js
          echo '' >> claude_review.js
          echo 'reviewCode().then(review => {' >> claude_review.js
          echo '  fs.writeFileSync("claude_review.md", review);' >> claude_review.js
          echo '  console.log("✅ Review completed successfully");' >> claude_review.js
          echo '}).catch(err => {' >> claude_review.js
          echo '  console.error("❌ Error:", err.message);' >> claude_review.js
          echo '  console.error("❌ Status:", err.status);' >> claude_review.js
          echo '  console.error("❌ Headers:", err.headers);' >> claude_review.js
          echo '  fs.writeFileSync("claude_review.md", "API 연결 테스트 실패: " + err.message);' >> claude_review.js
          echo '});' >> claude_review.js
          
          node claude_review.js

      - name: Comment on PR
        if: steps.changed-files.outputs.changed_file_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reviewContent;
            try {
              reviewContent = fs.readFileSync('claude_review.md', 'utf8');
            } catch (err) {
              reviewContent = '리뷰 파일을 읽을 수 없습니다.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude 코드 리뷰\n\n${reviewContent}`
            });
