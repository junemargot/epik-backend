name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

  issue_comment:
    types: [created]

jobs:
  review:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            You are reviewing a pull request. Read ALL existing review comments on this PR first.

            CRITICAL RULES:
            1. If a previous review comment pointed out an issue and the current code has ALREADY FIXED it, do NOT mention it again. Simply note "이전 피드백 반영 확인" at the top.
            2. Only report NEW issues that have not been mentioned in any previous review comment.
            3. If all previous issues are resolved and no new issues exist, respond with:
               "### ✅ 리뷰 완료\n이전 피드백이 모두 반영되었습니다. 추가 코멘트 없음."

            Review focus: code quality, potential bugs, performance, and project standards.
            **리뷰 결과는 한국어로 작성해주세요.**

          use_sticky_comment: false

  claude_agent:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Agent
        id: claude-agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
