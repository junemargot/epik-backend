name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.java"

jobs:
  claude-review:
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude-code review \
            --diff \
            --base origin/${{ github.event.pull_request.base.ref }} \
            --instructions "Always think in English, speak in Korean. Follow the CLAUDE.md guidelines in this repository. Use Korean strings as i18n keys with English translations. Always run Maven-based commands instead of npm (use ./mvnw). Focus on Spring Boot best practices, JPA/Hibernate usage, and security considerations." \
            --prompt "
              Please review this pull request and provide feedback on:
              - Code quality and best practices
              - Potential bugs or issues
              - Performance considerations
              - Security concerns
              - Test coverage
              Be constructive and helpful in your feedback."\
            --format github \
            > review-output.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewOutput = fs.readFileSync('review-output.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude 코드 리뷰\n\n${reviewOutput}`
            });
