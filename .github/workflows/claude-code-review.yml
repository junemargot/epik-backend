name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # paths:
    #  - "src/**/*.java"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review the PR changes in Korean. Focus on code quality and best practices, potential bugs or issues, and adherence to project standards and performance considerations. Suggest improvements and provide a detailed explanation.

          use_sticky_comment: true