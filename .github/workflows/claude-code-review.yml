name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.java"

jobs:
  claude-review:
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Java files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep '\.java$' > changed_files.txt || true
          FILE_COUNT=$(wc -l < changed_files.txt)
          echo "changed_file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          echo "## Changed Files Diff" > review_context.md
          head -20 changed_files.txt | while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "### $file" >> review_context.md
              echo '```diff' >> review_context.md
              git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | head -100 >> review_context.md
              echo '```' >> review_context.md
            fi
          done

      - name: Setup Node.js
        if: steps.changed-files.outputs.changed_file_count > 0
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Anthropic SDK
        if: steps.changed-files.outputs.changed_file_count > 0
        run: npm install @anthropic-ai/sdk

      - name: Create and Run Claude Code Review
        if: steps.changed-files.outputs.changed_file_count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # JavaScript 파일을 단계적으로 작성
          echo 'const Anthropic = require("@anthropic-ai/sdk");' > claude_review.js
          echo 'const fs = require("fs");' >> claude_review.js
          echo '' >> claude_review.js
          echo 'const anthropic = new Anthropic({' >> claude_review.js
          echo '  apiKey: process.env.ANTHROPIC_API_KEY,' >> claude_review.js
          echo '});' >> claude_review.js
          echo '' >> claude_review.js
          echo 'async function reviewCode() {' >> claude_review.js
          echo '  let contextContent = "";' >> claude_review.js
          echo '  try {' >> claude_review.js
          echo '    contextContent = fs.readFileSync("review_context.md", "utf8");' >> claude_review.js
          echo '  } catch (err) {' >> claude_review.js
          echo '    console.error("Context file read error:", err);' >> claude_review.js
          echo '    contextContent = "No diff context available.";' >> claude_review.js
          echo '  }' >> claude_review.js
          echo '' >> claude_review.js
          echo '  const systemInstructions = "Always think in English, speak in Korean. Focus on Spring Boot best practices, JPA/Hibernate usage, and security considerations.";' >> claude_review.js
          echo '  const userPrompt = "Please review this Spring Boot Java pull request and provide feedback in Korean on code quality, potential bugs, performance, security, and test coverage. Be constructive and helpful.\\n\\nChanges:\\n" + contextContent;' >> claude_review.js
          echo '' >> claude_review.js
          echo '  const message = await anthropic.messages.create({' >> claude_review.js
          echo '    model: "claude-3-5-sonnet-20241022",' >> claude_review.js
          echo '    max_tokens: 4000,' >> claude_review.js
          echo '    messages: [' >> claude_review.js
          echo '      {' >> claude_review.js
          echo '        role: "user",' >> claude_review.js
          echo '        content: systemInstructions + "\\n\\n" + userPrompt' >> claude_review.js
          echo '      }' >> claude_review.js
          echo '    ]' >> claude_review.js
          echo '  });' >> claude_review.js
          echo '' >> claude_review.js
          echo '  return message.content[0].text;' >> claude_review.js
          echo '}' >> claude_review.js
          echo '' >> claude_review.js
          echo 'reviewCode().then(review => {' >> claude_review.js
          echo '  fs.writeFileSync("claude_review.md", review);' >> claude_review.js
          echo '  console.log("Review completed successfully");' >> claude_review.js
          echo '}).catch(err => {' >> claude_review.js
          echo '  console.error("Error during review:", err);' >> claude_review.js
          echo '  const errorMsg = "리뷰 생성 중 오류가 발생했습니다: " + err.message;' >> claude_review.js
          echo '  fs.writeFileSync("claude_review.md", errorMsg);' >> claude_review.js
          echo '  process.exit(1);' >> claude_review.js
          echo '});' >> claude_review.js
          
          # 생성된 파일 확인
          echo "=== Generated JavaScript file ==="
          cat claude_review.js
          echo "================================="
          
          # 실행
          node claude_review.js

      - name: Comment on PR
        if: steps.changed-files.outputs.changed_file_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reviewContent;
            try {
              reviewContent = fs.readFileSync('claude_review.md', 'utf8');
            } catch (err) {
              reviewContent = '리뷰 파일을 읽을 수 없습니다.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude 코드 리뷰\n\n${reviewContent}`
            });
