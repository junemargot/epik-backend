name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # paths:
    #  - "src/**/*.java"

  issue_comment:
    types: [created]

jobs:
  review:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            **Crucially, ignore all previous review comments and discussions in this pull request.** Your task is to review the code **solely based on the latest cumulative changes (diff)** between the current PR branch and the base branch. 
                        Focus on code quality and best practices, potential bugs or issues, and adherence to project standards and performance considerations. Suggest specific improvements and provide a detailed explanation.
            **The review results must be written in Korean.**

          use_sticky_comment: false

  claude_agent:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Agent
        id: claude-agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}