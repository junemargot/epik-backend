name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMENT_BODY="${{ github.event.comment.body || github.event.review.body }}"
          QUESTION=$(echo "$COMMENT_BODY" | sed 's/@claude//g' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          echo "$QUESTION" | claude-code chat \
            --instructions "Always think in English, speak in Korean. Follow the CLAUDE.md guidelines in this repository. Use Korean strings as i18n keys with English translations. Always run Maven-based commands instead of npm (use ./mvnw)." \
            --context "Spring Boot Java project with JPA/Hibernate. User asked: $QUESTION" \
            --format github \
            > claude-response.md

      - name: Reply to Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('claude-response.md', 'utf8');

            if (context.eventName === 'issue_comment') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `@${{ github.event.comment.user.login }}\n\n${response}`
              });
            } else if (context.eventName === 'pull_request_review_comment') {
              github.rest.pulls.createReplyForReviewComment({
                pull_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                body: `@${{ github.event.comment.user.login }}\n\n${response}`
              });
            }